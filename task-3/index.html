<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To-Do List — DOM Manipulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="app">

  <header class="app__header">
    <h1>To-Do</h1>
    <p id="counter" class="app__counter">0 tasks remaining</p>
  </header>

  <form id="task-form" class="task-form">
    <input
      type="text"
      id="task-input"
      class="task-form__input"
      placeholder="Add a new task..."
      autocomplete="off"
    >
    <button type="submit" class="task-form__btn">Add</button>
  </form>

  <div class="filters" id="filters">
    <button class="filter-btn is-active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="active">Active</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
  </div>

  <ul id="task-list" class="task-list"></ul>

  <p id="empty-state" class="empty-state">No tasks yet — add one above.</p>

</main>

<script src="script.js"></script>
</body>
</html>
